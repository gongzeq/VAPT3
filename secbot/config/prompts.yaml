# Quick-command prompts served by ``GET /api/prompts``.
#
# Spec: .trellis/spec/backend/prompts-config.md
#
# Resolution order (first hit wins):
#   1. $SECBOT_PROMPTS_FILE
#   2. ~/.secbot/prompts.yaml   (user override)
#   3. this file                (bundled default, committed)
#
# Edits are picked up live — the backend stats this file on every request
# and reloads when mtime changes. No restart needed.
prompts:
  - key: scanAsset
    title: 全网资产发现
    subtitle: 扫描内网所有存活主机并入库 CMDB
    prefill: "对资产 192.168.1.0/24 发起一次轻量端口扫描，重点看 Web 服务"
    icon: Radar
  - key: weakPwd
    title: 弱口令检测
    subtitle: SSH/RDP/SMB 常见服务字典爆破
    prefill: "对最近一周新增的资产做一轮弱口令探测，结果按高危聚合"
    icon: Key
  - key: summarize
    title: 月度合规报告
    subtitle: 汇总当月扫描数据导出 PDF
    prefill: "把今天的扫描发现按业务系统聚合，生成一份执行摘要"
    icon: FileText
  - key: drill
    title: CVE 影响排查
    subtitle: 输入 CVE 编号，自动定位受影响资产
    prefill: "针对最近一条高危漏洞，给我一个验证 PoC 与修复建议"
    icon: Bug
