name: report
display_name: 报告生成
description: |
  Render the single canonical HTML deliverable for a completed scan.
  Reads from the local CMDB and materialises `<scan_dir>/report/report.html`;
  no other formats are supported.

system_prompt_file: ./prompts/report.md

scoped_skills:
  - report-html

max_iterations: 2
emit_plan_steps: false

input_schema:
  type: object
  required: [scan_id]
  properties:
    scan_id:
      type: string
      description: ULID of the scan to report on
    title:
      type: string
      description: Optional report title (defaults to "Scan <id> report")
    type:
      type: string
      enum: [custom, asset, port, vuln, weak_password, pentest]
      default: custom

output_schema:
  type: object
  required: [report_path, status]
  properties:
    report_path: {type: [string, "null"]}
    status:      {type: string, enum: [ok, empty]}
    asset_count:   {type: integer}
    finding_count: {type: integer}
    report_id:   {type: [string, "null"]}
