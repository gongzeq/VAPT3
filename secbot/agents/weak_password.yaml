name: weak_password
display_name: 弱口令检测
description: |
  Probe authenticated services (SSH, FTP, RDP, MySQL, Redis ...) for weak
  or default credentials. ALL skills in this agent are risk_level=critical
  and require explicit user confirmation before each invocation.

system_prompt_file: ./prompts/weak_password.md

scoped_skills:
  - hydra-bruteforce

max_iterations: 4
emit_plan_steps: true

input_schema:
  type: object
  required: [services]
  properties:
    services:
      type: array
      minItems: 1
      items:
        type: object
        required: [host, port, service]
        properties:
          host:    {type: string}
          port:    {type: integer}
          service: {type: string, enum: [ssh, ftp, rdp, mysql, redis, mssql, postgres, smb, telnet]}
    user_list:
      type: array
      items: {type: string}
    pass_list:
      type: array
      items: {type: string}

output_schema:
  type: object
  required: [findings]
  properties:
    findings:
      type: array
      items:
        type: object
        required: [host, port, service, username, password]
        properties:
          host:     {type: string}
          port:     {type: integer}
          service:  {type: string}
          username: {type: string}
          password: {type: string}
