<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="description"
      content="海盾智能体管控台 · secbot WebUI"
      data-i18n-meta="description"
    />
    <meta name="theme-color" content="#fafaf9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161618" media="(prefers-color-scheme: dark)" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/brand/logo.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/brand/apple-touch-180.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
    />
    <style>
      html,
      body,
      #root {
        height: 100%;
      }

      body {
        margin: 0;
        background: #ffffff;
        color: #0a0a0a;
        font-family:
          "Inter", "Noto Sans SC", system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial,
          "Noto Sans", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          sans-serif;
      }

      html.dark body {
        background: #1a1a1a;
        color: #fafafa;
      }

      .boot-splash {
        display: flex;
        height: 100%;
        align-items: center;
        justify-content: center;
      }

      .boot-splash-inner {
        display: flex;
        align-items: center;
        gap: 10px;
        color: rgba(255, 255, 255, 0.74);
        font-size: 14px;
      }

      html:not(.dark) .boot-splash-inner {
        color: rgba(10, 10, 10, 0.64);
      }

      .boot-dot {
        width: 8px;
        height: 8px;
        border-radius: 9999px;
        background: currentColor;
        opacity: 0.75;
        animation: boot-pulse 1s ease-in-out infinite;
      }

      @keyframes boot-pulse {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.45;
        }
        50% {
          transform: scale(1);
          opacity: 0.85;
        }
      }
    </style>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("secbot-webui.theme");
          var dark =
            stored === "dark" ||
            (!stored &&
              window.matchMedia &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch {}
      })();
    </script>
    <script>
      (function () {
        var localeKey = "secbot.locale";
        var copy = {
          en: {
            boot: "Loading secbot…",
            description: "secbot web UI — chat with your secbot workspace."
          },
          "zh-CN": {
            boot: "正在加载 secbot…",
            description: "secbot Web UI —— 与你的 secbot 工作区对话。"
          },
          "zh-TW": {
            boot: "正在載入 secbot…",
            description: "secbot Web UI —— 與你的 secbot 工作區對話。"
          },
          fr: {
            boot: "Chargement de secbot…",
            description: "Interface web secbot — discutez avec votre espace de travail secbot."
          },
          ja: {
            boot: "secbot を読み込み中…",
            description: "secbot Web UI — secbot ワークスペースと会話します。"
          },
          ko: {
            boot: "secbot 불러오는 중…",
            description: "secbot 웹 UI — secbot 작업공간과 대화하세요."
          },
          es: {
            boot: "Cargando secbot…",
            description: "Interfaz web secbot: conversa con tu espacio de trabajo de secbot."
          },
          vi: {
            boot: "Đang tải secbot…",
            description: "Giao diện web secbot — trò chuyện với workspace secbot của bạn."
          },
          id: {
            boot: "Memuat secbot…",
            description: "UI web secbot — ngobrol dengan workspace secbot Anda."
          }
        };

        function normalizeLocale(input) {
          if (!input) return "en";
          var raw = String(input).trim();
          if (!raw) return "en";
          if (copy[raw]) return raw;
          var lower = raw.toLowerCase();
          if (lower === "zh" || lower.indexOf("zh-cn") === 0 || lower.indexOf("zh-sg") === 0) {
            return "zh-CN";
          }
          if (
            lower.indexOf("zh-tw") === 0 ||
            lower.indexOf("zh-hk") === 0 ||
            lower.indexOf("zh-mo") === 0 ||
            lower.indexOf("zh-hant") === 0
          ) {
            return "zh-TW";
          }
          var base = lower.split("-")[0];
          return copy[base] ? base : "en";
        }

        try {
          var stored = localStorage.getItem(localeKey);
          var detected =
            stored ||
            (navigator.languages && navigator.languages[0]) ||
            navigator.language ||
            "en";
          var locale = normalizeLocale(detected);
          var localized = copy[locale] || copy.en;
          document.documentElement.lang = locale;
          var description = document.querySelector('[data-i18n-meta=\"description\"]');
          if (description) description.setAttribute("content", localized.description);
          var boot = document.querySelector("[data-boot-copy]");
          if (boot) boot.textContent = localized.boot;
        } catch {}
      })();
    </script>
    <title>secbot</title>
  </head>
  <body class="bg-background text-foreground antialiased">
    <div id="root">
      <div class="boot-splash">
        <div class="boot-splash-inner">
          <span class="boot-dot" aria-hidden="true"></span>
          <span data-boot-copy>Loading secbot…</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
